<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kennel Quote Builder</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #4a7c59;
    }

    p.subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #4a7c59;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .form-group {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4a7c59;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    button:hover {
      background: #3a6347;
    }

    .quote-result {
      display: none;
      margin-top: 28px;
      padding: 20px;
      background: #f0f7f2;
      border: 1px solid #b2d8bf;
      border-radius: 8px;
    }

    .quote-result h2 {
      font-size: 1.1rem;
      color: #4a7c59;
      margin-bottom: 14px;
    }

    .line-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.9rem;
      border-bottom: 1px solid #d6ead e;
    }

    .line-item:last-of-type {
      border-bottom: none;
    }

    .total {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      font-size: 1rem;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #4a7c59;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kennel Quote Builder</h1>
    <p class="subtitle">Fill in the details below to get an instant quote for your kennel.</p>

    <form id="quoteForm">
      <div class="row">
        <div class="form-group">
          <label for="length">Length (ft)</label>
          <input type="number" id="length" min="1" placeholder="e.g. 10" required />
        </div>
        <div class="form-group">
          <label for="width">Width (ft)</label>
          <input type="number" id="width" min="1" placeholder="e.g. 6" required />
        </div>
        <div class="form-group">
          <label for="height">Height (ft)</label>
          <input type="number" id="height" min="1" placeholder="e.g. 6" required />
        </div>
      </div>

      <div class="form-group">
        <label for="material">Material</label>
        <select id="material">
          <option value="chain-link">Chain Link</option>
          <option value="galvanized">Galvanized Steel</option>
          <option value="wood">Pressure-Treated Wood</option>
        </select>
      </div>

      <div class="form-group">
        <label for="roofing">Roofing</label>
        <select id="roofing">
          <option value="none">No Roof</option>
          <option value="tarp">Tarp Cover</option>
          <option value="metal">Metal Roof</option>
        </select>
      </div>

      <div class="form-group">
        <label for="flooring">Flooring</label>
        <select id="flooring">
          <option value="none">No Flooring (Ground)</option>
          <option value="gravel">Gravel Base</option>
          <option value="concrete">Concrete Pad</option>
        </select>
      </div>

      <div class="form-group">
        <label for="gate">Gate Type</label>
        <select id="gate">
          <option value="single">Single Gate</option>
          <option value="double">Double Gate</option>
        </select>
      </div>

      <button type="submit">Get My Quote</button>
    </form>

    <div class="quote-result" id="quoteResult">
      <h2>Your Estimated Quote</h2>
      <div id="lineItems"></div>
      <div class="total">
        <span>Estimated Total</span>
        <span id="totalPrice"></span>
      </div>
    </div>
  </div>

  <script>
    const MATERIAL_PRICES = {
      'chain-link':  3.50,  // per sq ft of panel
      'galvanized':  5.00,
      'wood':        4.00,
    };

    const ROOFING_PRICES = {
      'none':   0,
      'tarp':   1.25, // per sq ft of floor area
      'metal':  3.00,
    };

    const FLOORING_PRICES = {
      'none':     0,
      'gravel':   2.00, // per sq ft
      'concrete': 6.00,
    };

    const GATE_PRICES = {
      'single': 150,
      'double': 275,
    };

    document.getElementById('quoteForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const length = parseFloat(document.getElementById('length').value);
      const width  = parseFloat(document.getElementById('width').value);
      const height = parseFloat(document.getElementById('height').value);

      const material = document.getElementById('material').value;
      const roofing  = document.getElementById('roofing').value;
      const flooring = document.getElementById('flooring').value;
      const gate     = document.getElementById('gate').value;

      // Panel area: two long sides + two short sides
      const panelArea = 2 * (length * height) + 2 * (width * height);
      const floorArea = length * width;

      const materialCost = panelArea * MATERIAL_PRICES[material];
      const roofingCost  = floorArea * ROOFING_PRICES[roofing];
      const flooringCost = floorArea * FLOORING_PRICES[flooring];
      const gateCost     = GATE_PRICES[gate];

      const total = materialCost + roofingCost + flooringCost + gateCost;

      const fmt = (n) => '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

      const materialLabels = { 'chain-link': 'Chain Link', 'galvanized': 'Galvanized Steel', 'wood': 'Pressure-Treated Wood' };
      const roofingLabels  = { 'none': 'No Roof', 'tarp': 'Tarp Cover', 'metal': 'Metal Roof' };
      const flooringLabels = { 'none': 'No Flooring', 'gravel': 'Gravel Base', 'concrete': 'Concrete Pad' };
      const gateLabels     = { 'single': 'Single Gate', 'double': 'Double Gate' };

      const items = [
        { label: `Panels – ${materialLabels[material]} (${panelArea.toFixed(1)} sq ft)`, cost: materialCost },
        { label: `Roofing – ${roofingLabels[roofing]}`,  cost: roofingCost,  hide: roofing  === 'none' },
        { label: `Flooring – ${flooringLabels[flooring]}`, cost: flooringCost, hide: flooring === 'none' },
        { label: `Gate – ${gateLabels[gate]}`, cost: gateCost },
      ];

      const lineContainer = document.getElementById('lineItems');
      lineContainer.innerHTML = '';

      items.forEach(item => {
        if (item.hide) return;
        const div = document.createElement('div');
        div.className = 'line-item';
        div.innerHTML = `<span>${item.label}</span><span>${fmt(item.cost)}</span>`;
        lineContainer.appendChild(div);
      });

      document.getElementById('totalPrice').textContent = fmt(total);

      const result = document.getElementById('quoteResult');
      result.style.display = 'block';
      result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  </script>
</body>
</html>
